services:
  - type: web
    name: sleepy-commissions-api
    runtime: node
    rootDir: .
    buildCommand: npm install
    startCommand: npm run start --workspace server
    plan: free
    envVars:
      - key: NODE_VERSION
        value: 24.11.0
      - key: PORT
        value: 4000
      - key: ADMIN_KEY
        sync: false
      - key: CLIENT_URLS
        sync: false
      - key: MONGODB_URI
        sync: false
